<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Rede Social</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-4">

<header class="text-center mb-6">
  <h1 class="text-2xl font-bold">🔥 Minha Rede Social</h1>
  <p class="text-xs text-gray-400">Crie, curta e apague posts</p>
</header>

<div class="max-w-md mx-auto">

<button onclick="criarPost()" 
class="mb-6 w-full bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold shadow-lg">
+ Criar Post
</button>

<div class="space-y-4"></div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function salvarPosts() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function renderPosts() {
  const box = document.querySelector(".space-y-4");
  box.innerHTML = "";

  posts.forEach((post, index) => {
    box.innerHTML += `
      <div class="bg-slate-800 p-4 rounded-2xl shadow-lg">
        <p class="text-sm mb-3">${post.texto}</p>
        <div class="flex justify-between text-xs">
          <button onclick="curtirPost(${index})">❤️ ${post.likes}</button>
          <button onclick="apagarPost(${index})" class="text-red-400">🗑 Apagar</button>
        </div>
      </div>
    `;
  });
}

function criarPost() {
  const texto = prompt("Escreva seu post:");

  if (!texto || texto.trim() === "") {
    alert("Escreva algo primeiro!");
    return;
  }

  posts.unshift({ texto: texto, likes: 0 });
  salvarPosts();
  renderPosts();
}

function curtirPost(index) {
  posts[index].likes++;
  salvarPosts();
  renderPosts();
}

function apagarPost(index) {
  posts.splice(index, 1);
  salvarPosts();
  renderPosts();
}

renderPosts();

</script>

</body>
</html>
